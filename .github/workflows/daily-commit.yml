name: Daily Auto Commit
permissions:
  contents: write

on:
  schedule:
    - cron: '30 10 * * *'   # Runs daily at 10:30 UTC
  workflow_dispatch:

jobs:
  auto-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Git identity
        run: |
          git config user.name "DevSync Bot"
          git config user.email "24f1002360@ds.study.iitm.ac.in"

      - name: 24f1002360@ds.study.iitm.ac.in - Create daily commit
        run: |
          echo "Last updated on $(date)" > daily-log.txt
          git add daily-log.txt
          git commit -m "Automated daily commit - $(date)"
          git push origin main
